<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>С днём рождения, [Имя подруги]!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Музыкальный плеер (скрытый, но управляемый) -->
    <audio id="birthdaySong" loop>
        <source src="music/happy-birthday.mp3" type="audio/mpeg">
        Ваш браузер не поддерживает аудио.
    </audio>

    <!-- Главный контейнер -->
    <div class="container">
        <h1 class="glow-text">🎉 С ДНЁМ РОЖДЕНИЯ, [ИМЯ]! 🎉</h1>
        <p class="subtitle">Кликни по фото — почувствуй магию</p>

        <!-- Галерея -->
        <div class="gallery" id="gallery">
            <!-- Сюда динамически добавим фото через JS -->
        </div>

        <!-- Кнопка управления музыкой -->
        <button id="musicToggle" class="music-btn">🔇 Включить музыку</button>

        <!-- Кнопка копирования ссылки -->
        <button id="copyLinkBtn" class="copy-btn">📎 Отправить подруге ссылку</button>
        <span id="copyMessage" class="copy-message"></span>
    </div>

    <!-- Эффект конфетти (библиотека) -->
    <canvas id="confettiCanvas" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999;"></canvas>

    <script src="script.js"></script>
</body>
</html>
